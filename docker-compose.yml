services:
  web-search:
    container_name: web-search
    image: web-search
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_PATH: ${MCP_PATH:-/mcp}
      FASTMCP_STATELESS_HTTP: ${FASTMCP_STATELESS_HTTP:-true}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8000}:${MCP_PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\\\"MCP_PORT\\\", \\\"8000\\\")}/healthz', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
